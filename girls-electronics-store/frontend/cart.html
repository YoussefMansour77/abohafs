<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أبو حفص | سلة التسوق</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: #f8f9fc;
        }

        .navbar {
            background: white;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 15px 0;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 25px;
        }

        .nav-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #e67e22, #d35400);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
        }

        .logo-text h1 {
            font-size: 26px;
            font-weight: 800;
            color: #2c3e50;
        }

        .logo-text p {
            font-size: 11px;
            color: #7f8c8d;
        }

        .nav-links {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: #2c3e50;
            font-weight: 500;
            transition: 0.3s;
            font-size: 16px;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: #e67e22;
        }

        .nav-icons {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .cart-icon {
            position: relative;
            cursor: pointer;
            font-size: 22px;
            color: #2c3e50;
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -10px;
            background: #e67e22;
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 50%;
        }

        .breadcrumb {
            margin: 25px 0;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #7f8c8d;
        }

        .breadcrumb a {
            color: #7f8c8d;
            text-decoration: none;
        }

        .cart-layout {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 30px;
            margin: 30px 0;
        }

        .cart-items-section {
            background: white;
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .cart-header h2 {
            font-size: 24px;
            color: #2c3e50;
        }

        .clear-cart-btn {
            background: none;
            border: none;
            color: #e74c3c;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }

        .cart-table {
            width: 100%;
            border-collapse: collapse;
        }

        .cart-table th {
            text-align: right;
            padding: 15px 10px;
            color: #7f8c8d;
            font-weight: 600;
            font-size: 14px;
            border-bottom: 1px solid #e9ecef;
        }

        .cart-table td {
            padding: 20px 10px;
            border-bottom: 1px solid #e9ecef;
            vertical-align: middle;
        }

        .product-cell {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .product-img {
            width: 70px;
            height: 70px;
            background: #f5f5f5;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .product-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-img i {
            font-size: 30px;
            color: #e67e22;
        }

        .product-name {
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .product-category {
            font-size: 12px;
            color: #7f8c8d;
        }

        .quantity-control {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .qty-btn {
            width: 32px;
            height: 32px;
            background: #f8f9fc;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: 0.3s;
        }

        .qty-btn:hover {
            background: #e67e22;
            color: white;
        }

        .qty-input {
            width: 50px;
            text-align: center;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 6px;
            font-size: 14px;
            font-weight: 600;
        }

        .item-price,
        .item-total {
            font-weight: 700;
        }

        .item-total {
            color: #e67e22;
        }

        .remove-btn {
            background: none;
            border: none;
            color: #e74c3c;
            cursor: pointer;
            font-size: 18px;
            transition: 0.3s;
        }

        .cart-summary {
            background: white;
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
            height: fit-content;
            position: sticky;
            top: 100px;
        }

        .summary-title {
            font-size: 20px;
            font-weight: 800;
            color: #2c3e50;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 14px;
            color: #7f8c8d;
        }

        .summary-total {
            display: flex;
            justify-content: space-between;
            margin: 20px 0;
            padding-top: 15px;
            border-top: 2px solid #f0f0f0;
            font-size: 20px;
            font-weight: 800;
            color: #2c3e50;
        }

        .checkout-btn {
            width: 100%;
            padding: 15px;
            background: #e67e22;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 15px;
        }

        .checkout-btn:hover {
            background: #d35400;
            transform: translateY(-2px);
        }

        .continue-shopping {
            display: block;
            text-align: center;
            color: #e67e22;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }

        .empty-cart {
            text-align: center;
            padding: 60px;
            background: white;
            border-radius: 24px;
        }

        .empty-cart i {
            font-size: 80px;
            color: #bdc3c7;
            margin-bottom: 20px;
        }

        .shop-now-btn {
            display: inline-block;
            padding: 12px 30px;
            background: #e67e22;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: 600;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #27ae60;
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            z-index: 9999;
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 992px) {
            .cart-layout {
                grid-template-columns: 1fr;
            }

            .cart-summary {
                position: static;
            }
        }

        @media (max-width: 768px) {
            .nav-wrapper {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <div class="container">
            <div class="nav-wrapper">
                <div class="logo">
                    <div class="logo-icon"><i class="fas fa-laptop-code"></i></div>
                    <div class="logo-text">
                        <h1>أبو حفص</h1>
                        <p>متجر الكترونيات وكماليات الكمبيوتر</p>
                    </div>
                </div>
                <div class="nav-links"><a href="index.html">الرئيسية</a><a href="products.html">المنتجات</a><a
                        href="cart.html" class="active">السلة</a></div>
                <div class="nav-icons">
                    <div class="cart-icon" id="cartIcon"><i class="fas fa-shopping-cart"></i><span class="cart-count"
                            id="cartCount">0</span></div>
                </div>
            </div>
        </div>
    </nav>

    <main>
        <div class="container">
            <div class="breadcrumb"><a href="index.html">الرئيسية</a><i class="fas fa-chevron-left"></i><span>سلة
                    التسوق</span></div>
            <div id="cartContainer"></div>
        </div>
    </main>

    <script>
        let cart = JSON.parse(localStorage.getItem('cart')) || [];

        function updateCartCount() {
            const total = cart.reduce((s, i) => s + i.quantity, 0);
            document.getElementById('cartCount').innerText = total;
            localStorage.setItem('cart', JSON.stringify(cart));
        }

        function showToast(msg) {
            const t = document.createElement('div');
            t.className = 'toast';
            t.innerHTML = `✅ ${msg}`;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        function getCategoryIcon(cat) { const i = { laptops: 'laptop', screens: 'tv', cases: 'server', accessories: 'headphones' }; return i[cat] || 'box'; }
        function getCategoryName(cat) { const n = { laptops: 'لابتوب', screens: 'شاشة', cases: 'كيسة', accessories: 'اكسسوار' }; return n[cat] || cat; }

        function updateQuantity(id, newQty) {
            const item = cart.find(i => i.id === id);
            if (item) {
                if (newQty <= 0) removeFromCart(id);
                else { item.quantity = newQty; updateCartCount(); renderCart(); showToast(`تم تحديث كمية ${item.name}`); }
            }
        }

        function removeFromCart(id) {
            const item = cart.find(i => i.id === id);
            if (item && confirm(`هل أنت متأكد من إزالة ${item.name}؟`)) {
                cart = cart.filter(i => i.id !== id);
                updateCartCount(); renderCart(); showToast(`تم إزالة ${item.name}`);
            }
        }

        function clearCart() { if (cart.length > 0 && confirm('تفريغ السلة بالكامل؟')) { cart = []; updateCartCount(); renderCart(); showToast('تم تفريغ السلة'); } }
        function calculateSubtotal() { return cart.reduce((s, i) => s + (i.price * i.quantity), 0); }
        function calculateShipping() { const sub = calculateSubtotal(); if (sub === 0) return 0; if (sub >= 1000) return 0; return 50; }
        function calculateTotal() { return calculateSubtotal() + calculateShipping(); }
        function proceedToCheckout() { if (cart.length > 0) window.location.href = 'checkout.html'; else showToast('السلة فارغة'); }

        function renderCart() {
            const container = document.getElementById('cartContainer');
            if (cart.length === 0) { container.innerHTML = `<div class="empty-cart"><i class="fas fa-shopping-cart"></i><h3>سلة التسوق فارغة</h3><a href="products.html" class="shop-now-btn">تسوق الآن</a></div>`; return; }
            const subtotal = calculateSubtotal(); const shipping = calculateShipping(); const total = calculateTotal();
            container.innerHTML = `<div class="cart-layout"><div class="cart-items-section"><div class="cart-header"><h2>🛒 سلة التسوق (${cart.reduce((s, i) => s + i.quantity, 0)} منتج)</h2><button class="clear-cart-btn" onclick="clearCart()"><i class="fas fa-trash-alt"></i> تفريغ السلة</button></div><div style="overflow-x:auto;"><table class="cart-table"><thead><tr><th>المنتج</th><th>السعر</th><th>الكمية</th><th>الإجمالي</th><th></th></thead><tbody>${cart.map(item => `<tr><td><div class="product-cell"><div class="product-img">${item.image && item.image !== 'null' && item.image !== '' ? `<img src="${item.image}">` : `<i class="fas fa-${getCategoryIcon(item.category)}"></i>`}</div><div><div class="product-name">${item.name}</div><div class="product-category">${getCategoryName(item.category)}</div></div></div></td><td class="item-price">${item.price.toLocaleString()} ج.م</td><td><div class="quantity-control"><button class="qty-btn" onclick="updateQuantity(${item.id}, ${item.quantity - 1})">-</button><input type="text" class="qty-input" value="${item.quantity}" readonly><button class="qty-btn" onclick="updateQuantity(${item.id}, ${item.quantity + 1})">+</button></div></td><td class="item-total">${(item.price * item.quantity).toLocaleString()} ج.م</td><td><button class="remove-btn" onclick="removeFromCart(${item.id})"><i class="fas fa-trash-alt"></i></button></td></tr>`).join('')}</tbody></table></div></div><div class="cart-summary"><div class="summary-title">ملخص الطلب</div><div class="summary-row"><span>المجموع الفرعي</span><span>${subtotal.toLocaleString()} ج.م</span></div><div class="summary-row"><span>الشحن</span><span>${shipping === 0 ? 'مجاني' : shipping.toLocaleString() + ' ج.م'}</span></div>${shipping > 0 ? `<div class="summary-row" style="color:#e67e22;"><span>💡 أضف ${(1000 - subtotal).toLocaleString()} ج.م للشحن المجاني</span></div>` : ''}<div class="summary-total"><span>الإجمالي</span><span>${total.toLocaleString()} ج.م</span></div><button class="checkout-btn" onclick="proceedToCheckout()"><i class="fas fa-credit-card"></i> إتمام الشراء</button><a href="products.html" class="continue-shopping"><i class="fas fa-arrow-right"></i> متابعة التسوق</a></div></div>`;
        }

        document.addEventListener('DOMContentLoaded', () => { renderCart(); updateCartCount(); document.getElementById('cartIcon').addEventListener('click', () => { window.location.href = 'cart.html'; }); });
        window.updateQuantity = updateQuantity; window.removeFromCart = removeFromCart; window.clearCart = clearCart; window.proceedToCheckout = proceedToCheckout;
    </script>
</body>

</html>
