<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>أبو حفص | تسجيل دخول الأدمن</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Cairo', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow-x: hidden;
    }

    .bg-animation {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 0;
    }

    .bg-animation .circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      animation: float 20s infinite linear;
    }

    .circle:nth-child(1) {
      width: 300px;
      height: 300px;
      top: -150px;
      left: -150px;
      animation-duration: 25s;
    }

    .circle:nth-child(2) {
      width: 200px;
      height: 200px;
      bottom: -100px;
      right: -100px;
      animation-duration: 20s;
    }

    .circle:nth-child(3) {
      width: 150px;
      height: 150px;
      top: 50%;
      right: 20%;
      animation-duration: 18s;
    }

    @keyframes float {
      0% {
        transform: translateY(0) rotate(0deg);
      }

      50% {
        transform: translateY(-50px) rotate(180deg);
      }

      100% {
        transform: translateY(0) rotate(360deg);
      }
    }

    .login-container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 450px;
      margin: 20px;
    }

    .login-card {
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(10px);
      border-radius: 32px;
      padding: 40px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);
      animation: slideUp 0.5s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(50px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo-icon {
      width: 70px;
      height: 70px;
      background: linear-gradient(135deg, #e67e22, #d35400);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 15px;
      font-size: 32px;
      color: white;
    }

    .logo h1 {
      font-size: 28px;
      font-weight: 800;
      color: #2c3e50;
    }

    .logo p {
      font-size: 13px;
      color: #7f8c8d;
      margin-top: 5px;
    }

    .login-title {
      text-align: center;
      margin-bottom: 30px;
    }

    .login-title h2 {
      font-size: 24px;
      color: #2c3e50;
      margin-bottom: 8px;
    }

    .form-group {
      margin-bottom: 25px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #2c3e50;
      font-size: 14px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper i {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: #bdc3c7;
      font-size: 18px;
    }

    .form-group input {
      width: 100%;
      padding: 14px 45px 14px 15px;
      border: 2px solid #e9ecef;
      border-radius: 16px;
      font-size: 15px;
      transition: 0.3s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #e67e22;
    }

    .toggle-password {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #bdc3c7;
      font-size: 18px;
    }

    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      font-size: 13px;
    }

    .checkbox {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .checkbox input {
      width: 16px;
      height: 16px;
      accent-color: #e67e22;
    }

    .forgot-link {
      color: #e67e22;
      text-decoration: none;
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #e67e22, #d35400);
      color: white;
      border: none;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.3s;
      margin-bottom: 20px;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(230, 126, 34, 0.3);
    }

    .back-link {
      text-align: center;
    }

    .back-link a {
      color: #7f8c8d;
      text-decoration: none;
      font-size: 14px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .error-message {
      background: #fee2e2;
      color: #c62828;
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
      align-items: center;
      gap: 10px;
      animation: shake 0.5s;
    }

    @keyframes shake {

      0%,
      100% {
        transform: translateX(0);
      }

      25% {
        transform: translateX(-5px);
      }

      75% {
        transform: translateX(5px);
      }
    }

    .warning-message {
      background: #fff3cd;
      color: #856404;
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 20px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    @media (max-width:480px) {
      .login-card {
        padding: 30px 25px;
      }
    }
  </style>
</head>

<body>
  <div class="bg-animation">
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
  </div>
  <div class="login-container">
    <div class="login-card">
      <div class="logo">
        <div class="logo-icon"><i class="fas fa-shield-alt"></i></div>
        <h1>أبو حفص</h1>
        <p>لوحة تحكم الأدمن</p>
      </div>
      <div class="login-title">
        <h2>🔐 تسجيل الدخول</h2>
        <p>أدخل بياناتك للوصول إلى لوحة التحكم</p>
      </div>
      <div id="errorMessage" class="error-message"><i class="fas fa-exclamation-triangle"></i><span
          id="errorText"></span></div>
      <div class="warning-message"><i class="fas fa-info-circle"></i><span>🔒 للإدمن فقط | اسم المستخدم:
          <strong>admin</strong> | كلمة المرور: <strong>admin123</strong></span></div>
      <form id="loginForm">
        <div class="form-group"><label>👤 اسم المستخدم</label>
          <div class="input-wrapper"><i class="fas fa-user"></i><input type="text" id="username"
              placeholder="أدخل اسم المستخدم"></div>
        </div>
        <div class="form-group"><label>🔑 كلمة المرور</label>
          <div class="input-wrapper"><i class="fas fa-lock"></i><input type="password" id="password"
              placeholder="أدخل كلمة المرور"><i class="fas fa-eye toggle-password" onclick="togglePassword()"></i></div>
        </div>
        <div class="form-options"><label class="checkbox"><input type="checkbox" id="rememberMe"> تذكرني</label><a
            href="#" class="forgot-link">نسيت كلمة المرور؟</a></div><button type="submit" class="login-btn"><i
            class="fas fa-sign-in-alt"></i> تسجيل الدخول</button>
        <div class="back-link"><a href="index.html"><i class="fas fa-arrow-right"></i> العودة للمتجر</a></div>
      </form>
    </div>
  </div>
  <script>
    const ADMIN = { username: "admin", password: "admin123" };
    function checkRemembered() { const remembered = localStorage.getItem('adminRemembered'); if (remembered === 'true') { const saved = localStorage.getItem('adminUsername'); if (saved) { document.getElementById('username').value = saved; document.getElementById('rememberMe').checked = true; } } }
    function showError(msg) { const errDiv = document.getElementById('errorMessage'); document.getElementById('errorText').innerText = msg; errDiv.style.display = 'flex'; setTimeout(() => errDiv.style.display = 'none', 3000); }
    function togglePassword() { const pwd = document.getElementById('password'); const icon = document.querySelector('.toggle-password'); if (pwd.type === 'password') { pwd.type = 'text'; icon.classList.remove('fa-eye'); icon.classList.add('fa-eye-slash'); } else { pwd.type = 'password'; icon.classList.remove('fa-eye-slash'); icon.classList.add('fa-eye'); } }
    function handleLogin(e) { e.preventDefault(); const username = document.getElementById('username').value.trim(); const password = document.getElementById('password').value; const remember = document.getElementById('rememberMe').checked; if (!username || !password) { showError('❌ يرجى إدخال اسم المستخدم وكلمة المرور'); return; } if (username === ADMIN.username && password === ADMIN.password) { sessionStorage.setItem('adminLoggedIn', 'true'); if (remember) { localStorage.setItem('adminRemembered', 'true'); localStorage.setItem('adminUsername', username); } else { localStorage.removeItem('adminRemembered'); localStorage.removeItem('adminUsername'); } const toast = document.createElement('div'); toast.style.cssText = 'position:fixed;top:20px;right:20px;background:#27ae60;color:white;padding:12px24px;border-radius:12px;z-index:9999;'; toast.innerHTML = '✅ تم تسجيل الدخول بنجاح... جاري التحويل'; document.body.appendChild(toast); setTimeout(() => { window.location.href = 'admin.html'; }, 1000); } else { showError('❌ اسم المستخدم أو كلمة المرور غير صحيحة'); } }
    function checkAlreadyLoggedIn() { if (sessionStorage.getItem('adminLoggedIn') === 'true') window.location.href = 'admin.html'; }
    document.addEventListener('DOMContentLoaded', () => { checkAlreadyLoggedIn(); checkRemembered(); document.getElementById('loginForm').addEventListener('submit', handleLogin); document.getElementById('password').addEventListener('keypress', (e) => { if (e.key === 'Enter') handleLogin(e); }); });
    window.togglePassword = togglePassword;
  </script>
</body>

</html>
