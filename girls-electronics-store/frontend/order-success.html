<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أبو حفص | تم إتمام الطلب</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: #f8f9fc;
        }

        .navbar {
            background: white;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 15px 0;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 25px;
        }

        .nav-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #e67e22, #d35400);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
        }

        .logo-text h1 {
            font-size: 26px;
            font-weight: 800;
            color: #2c3e50;
        }

        .logo-text p {
            font-size: 11px;
            color: #7f8c8d;
        }

        .nav-links {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: #2c3e50;
            font-weight: 500;
            transition: 0.3s;
            font-size: 16px;
        }

        .nav-links a:hover {
            color: #e67e22;
        }

        .nav-icons {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .cart-icon {
            position: relative;
            cursor: pointer;
            font-size: 22px;
            color: #2c3e50;
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -10px;
            background: #e67e22;
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 50%;
        }

        .success-container {
            max-width: 900px;
            margin: 40px auto;
        }

        .success-card {
            background: white;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
        }

        .success-header {
            background: linear-gradient(135deg, #27ae60, #229954);
            padding: 50px 30px;
            text-align: center;
            color: white;
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 40px;
        }

        .success-header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .order-number {
            background: rgba(255, 255, 255, 0.15);
            display: inline-block;
            padding: 8px 20px;
            border-radius: 30px;
            margin-top: 20px;
            font-size: 14px;
            font-weight: 600;
        }

        .success-content {
            padding: 30px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .info-card {
            background: #f8f9fc;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #e9ecef;
        }

        .info-card h3 {
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-card h3 i {
            color: #e67e22;
        }

        .info-card p {
            font-size: 16px;
            font-weight: 600;
            color: #2c3e50;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .order-table {
            width: 100%;
            border-collapse: collapse;
        }

        .order-table th {
            text-align: right;
            padding: 15px 10px;
            background: #f8f9fc;
            color: #7f8c8d;
            font-weight: 600;
            font-size: 13px;
        }

        .order-table td {
            padding: 15px 10px;
            border-bottom: 1px solid #e9ecef;
        }

        .product-cell {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .product-img {
            width: 50px;
            height: 50px;
            background: #f5f5f5;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .product-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-img i {
            font-size: 24px;
            color: #e67e22;
        }

        .order-summary-box {
            background: #f8f9fc;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #e9ecef;
        }

        .summary-row:last-child {
            border-bottom: none;
        }

        .total-row {
            margin-top: 10px;
            padding-top: 15px;
            border-top: 2px solid #e9ecef;
            font-size: 18px;
            font-weight: 800;
        }

        .total-row .summary-value {
            color: #e67e22;
            font-size: 22px;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .btn-primary {
            background: #e67e22;
            color: white;
            padding: 12px 30px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary:hover {
            background: #d35400;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #2c3e50;
            color: white;
            padding: 12px 30px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .loading {
            text-align: center;
            padding: 60px;
        }

        .not-found {
            text-align: center;
            padding: 80px 20px;
            background: white;
            border-radius: 32px;
        }

        @media (max-width: 768px) {
            .nav-wrapper {
                flex-direction: column;
            }

            .info-grid {
                grid-template-columns: 1fr;
            }

            .order-table {
                display: block;
                overflow-x: auto;
            }
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <div class="container">
            <div class="nav-wrapper">
                <div class="logo">
                    <div class="logo-icon"><i class="fas fa-laptop-code"></i></div>
                    <div class="logo-text">
                        <h1>أبو حفص</h1>
                        <p>متجر الكترونيات وكماليات الكمبيوتر</p>
                    </div>
                </div>
                <div class="nav-links"><a href="index.html">الرئيسية</a><a href="products.html">المنتجات</a><a
                        href="cart.html">السلة</a></div>
                <div class="nav-icons">
                    <div class="cart-icon" id="cartIcon"><i class="fas fa-shopping-cart"></i><span class="cart-count"
                            id="cartCount">0</span></div>
                </div>
            </div>
        </div>
    </nav>

    <main>
        <div class="container">
            <div id="successContainer" class="success-container">
                <div class="loading"><i class="fas fa-spinner fa-spin" style="font-size:50px;color:#e67e22;"></i>
                    <p>جاري تحميل تفاصيل الطلب...</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        let orders = JSON.parse(localStorage.getItem('orders')) || [];
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        function updateCartCount() { const total = cart.reduce((s, i) => s + i.quantity, 0); document.getElementById('cartCount').innerText = total; }
        function getCategoryIcon(cat) { const i = { laptops: 'laptop', screens: 'tv', cases: 'server', accessories: 'headphones' }; return i[cat] || 'box'; }
        function getPaymentMethodName(m) { const n = { cash: '💰 كاش', card: '💳 بطاقة', vodafone: '📱 فودافون كاش', instapay: '🏦 إنستا باي' }; return n[m] || m; }
        function getOrderFromUrl() { const params = new URLSearchParams(window.location.search); const id = parseInt(params.get('id')); return orders.find(o => o.id === id); }
        function getCategoryName(cat) { const n = { laptops: 'لابتوب', screens: 'شاشة', cases: 'كيسة', accessories: 'اكسسوار' }; return n[cat] || cat; }

        function renderSuccessPage(order) {
            const container = document.getElementById('successContainer');
            const date = new Date(order.dateISO);
            const formattedDate = date.toLocaleDateString('ar-EG', { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' });
            container.innerHTML = `<div class="success-card"><div class="success-header"><div class="success-icon"><i class="fas fa-check-circle"></i></div><h1>تم إتمام الطلب بنجاح! 🎉</h1><p>شكراً لتسوقك مع أبو حفص</p><div class="order-number"><i class="fas fa-receipt"></i> رقم الطلب: ${order.orderNumber}</div></div><div class="success-content"><div class="info-grid"><div class="info-card"><h3><i class="fas fa-user"></i> معلومات العميل</h3><p>${order.customerName}</p><p style="font-size:14px;">${order.email}</p><p style="font-size:14px;">📞 ${order.phone}</p></div><div class="info-card"><h3><i class="fas fa-map-marker-alt"></i> عنوان الشحن</h3><p>${order.address}</p><p style="font-size:14px;">📍 ${order.city}</p></div><div class="info-card"><h3><i class="fas fa-credit-card"></i> طريقة الدفع</h3><p>${getPaymentMethodName(order.paymentMethod)}</p><p style="font-size:14px;"><i class="fas fa-calendar-alt"></i> ${formattedDate}</p></div></div><div class="section-title"><i class="fas fa-boxes"></i><span>منتجات الطلب</span></div><div style="overflow-x:auto;"><table class="order-table"><thead><tr><th>المنتج</th><th>السعر</th><th>الكمية</th><th>الإجمالي</th> </thead><tbody>${order.items.map(i => `<tr><td><div class="product-cell"><div class="product-img">${i.image && i.image !== 'null' && i.image !== '' ? `<img src="${i.image}">` : `<i class="fas fa-${getCategoryIcon(i.category)}"></i>`}</div><div><div style="font-weight:600;">${i.name}</div><div style="font-size:12px;color:#7f8c8d;">${getCategoryName(i.category)}</div></div></div></td><td>${i.price.toLocaleString()} ج.م</td><td>${i.quantity}</td><td style="font-weight:700;color:#e67e22;">${(i.price * i.quantity).toLocaleString()} ج.م</td></tr>`).join('')}</tbody></table></div><div class="order-summary-box"><div class="summary-row"><span>المجموع الفرعي</span><span>${order.subtotal.toLocaleString()} ج.م</span></div><div class="summary-row"><span>الشحن</span><span>${order.shipping === 0 ? 'مجاني' : order.shipping.toLocaleString() + ' ج.م'}</span></div><div class="summary-row total-row"><span>الإجمالي المدفوع</span><span>${order.total.toLocaleString()} ج.م</span></div></div>${order.notes ? `<div style="background:#fff5ed;padding:15px;border-radius:16px;margin-bottom:20px;"><div style="display:flex;gap:10px;"><i class="fas fa-pen" style="color:#e67e22;"></i><div><div style="font-weight:600;">ملاحظات الطلب:</div><p style="color:#5a6e7c;">${order.notes}</p></div></div></div>` : ''}<div style="background:#e8f5e9;padding:15px;border-radius:16px;margin-bottom:25px;"><div style="display:flex;gap:10px;"><i class="fas fa-truck-fast" style="color:#27ae60;"></i><div><div style="font-weight:600;">معلومات الشحن</div><p style="color:#2e7d32;font-size:14px;">سيتم تجهيز طلبك خلال 24 ساعة. مدة التوصيل 2-4 أيام عمل.</p></div></div></div><div class="action-buttons"><a href="products.html" class="btn-primary"><i class="fas fa-shopping-bag"></i> متابعة التسوق</a><a href="index.html" class="btn-secondary"><i class="fas fa-home"></i> الرئيسية</a><button class="btn-secondary" onclick="window.print()"><i class="fas fa-print"></i> طباعة</button></div></div></div>`;
        }

        function renderNotFound() { document.getElementById('successContainer').innerHTML = `<div class="not-found"><i class="fas fa-search"></i><h2>لم يتم العثور على الطلب</h2><a href="index.html" class="btn-primary">العودة للرئيسية</a></div>`; }

        document.addEventListener('DOMContentLoaded', () => { updateCartCount(); const order = getOrderFromUrl(); if (order) renderSuccessPage(order); else renderNotFound(); document.getElementById('cartIcon').addEventListener('click', () => { window.location.href = 'cart.html'; }); });
    </script>
</body>

</html>
