<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أبو حفص | تفاصيل المنتج</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: #f8f9fc;
        }

        .navbar {
            background: white;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 15px 0;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 25px;
        }

        .nav-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #e67e22, #d35400);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
        }

        .logo-text h1 {
            font-size: 26px;
            font-weight: 800;
            color: #2c3e50;
        }

        .logo-text p {
            font-size: 11px;
            color: #7f8c8d;
        }

        .nav-links {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: #2c3e50;
            font-weight: 500;
            transition: 0.3s;
            font-size: 16px;
        }

        .nav-links a:hover {
            color: #e67e22;
        }

        .nav-icons {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .cart-icon {
            position: relative;
            cursor: pointer;
            font-size: 22px;
            color: #2c3e50;
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -10px;
            background: #e67e22;
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 50%;
        }

        .breadcrumb {
            margin: 25px 0;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #7f8c8d;
        }

        .breadcrumb a {
            color: #7f8c8d;
            text-decoration: none;
        }

        .breadcrumb a:hover {
            color: #e67e22;
        }

        .product-detail {
            background: white;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            margin-bottom: 40px;
        }

        .product-detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
        }

        .product-gallery {
            background: linear-gradient(135deg, #fafbfc, #f5f7fa);
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .main-image {
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
            min-height: 350px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-image img {
            max-width: 100%;
            max-height: 300px;
            object-fit: contain;
        }

        .main-image i {
            font-size: 120px;
            color: #e67e22;
        }

        .thumbnail-list {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .thumbnail {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
            border: 2px solid transparent;
        }

        .thumbnail.active {
            border-color: #e67e22;
        }

        .thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
        }

        .thumbnail i {
            font-size: 32px;
            color: #7f8c8d;
        }

        .product-info-detail {
            padding: 40px;
        }

        .product-badge {
            display: inline-block;
            background: #e67e22;
            color: white;
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .product-title-detail {
            font-size: 32px;
            font-weight: 800;
            color: #2c3e50;
            margin-bottom: 15px;
        }

        .product-category-detail {
            display: inline-block;
            background: #fff5ed;
            color: #e67e22;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .product-price-detail {
            font-size: 36px;
            font-weight: 800;
            color: #e67e22;
            margin: 20px 0;
        }

        .product-description {
            color: #5a6e7c;
            line-height: 1.8;
            margin-bottom: 30px;
            font-size: 15px;
        }

        .quantity-section {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .quantity-label {
            font-weight: 600;
            color: #2c3e50;
        }

        .quantity-selector {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f8f9fc;
            border-radius: 12px;
            padding: 5px;
        }

        .quantity-btn {
            width: 40px;
            height: 40px;
            background: white;
            border: 1px solid #e9ecef;
            border-radius: 10px;
            cursor: pointer;
            font-size: 18px;
            font-weight: 600;
            transition: 0.3s;
        }

        .quantity-btn:hover {
            background: #e67e22;
            color: white;
            border-color: #e67e22;
        }

        .quantity-input {
            width: 60px;
            text-align: center;
            border: none;
            font-size: 18px;
            font-weight: 600;
            background: transparent;
        }

        .btn-add-cart {
            width: 100%;
            padding: 16px;
            background: #e67e22;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-add-cart:hover {
            background: #d35400;
            transform: translateY(-2px);
        }

        .stock-status {
            margin-top: 20px;
            padding: 12px;
            background: #e8f5e9;
            border-radius: 12px;
            color: #2e7d32;
            font-size: 14px;
            font-weight: 600;
            display: inline-block;
        }

        .stock-status.out-of-stock {
            background: #ffebee;
            color: #c62828;
        }

        .error-container {
            text-align: center;
            padding: 60px;
            background: white;
            border-radius: 28px;
        }

        .error-container i {
            font-size: 60px;
            color: #bdc3c7;
            margin-bottom: 20px;
        }

        .error-container h3 {
            font-size: 24px;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .btn-back {
            display: inline-block;
            padding: 12px 30px;
            background: #e67e22;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: 600;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #27ae60;
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            z-index: 9999;
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 992px) {
            .product-detail-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .nav-wrapper {
                flex-direction: column;
            }

            .product-title-detail {
                font-size: 24px;
            }
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <div class="container">
            <div class="nav-wrapper">
                <div class="logo">
                    <div class="logo-icon"><i class="fas fa-laptop-code"></i></div>
                    <div class="logo-text">
                        <h1>أبو حفص</h1>
                        <p>متجر الكترونيات وكماليات الكمبيوتر</p>
                    </div>
                </div>
                <div class="nav-links"><a href="index.html">الرئيسية</a><a href="products.html">المنتجات</a><a
                        href="cart.html">السلة</a></div>
                <div class="nav-icons">
                    <div class="cart-icon" id="cartIcon"><i class="fas fa-shopping-cart"></i><span class="cart-count"
                            id="cartCount">0</span></div>
                </div>
            </div>
        </div>
    </nav>

    <main>
        <div class="container">
            <div class="breadcrumb"><a href="index.html">الرئيسية</a><i class="fas fa-chevron-left"></i><a
                    href="products.html">المنتجات</a><i class="fas fa-chevron-left"></i><span
                    id="productNameSpan">تفاصيل المنتج</span></div>
            <div id="productDetailContainer">
                <div class="error-container"><i class="fas fa-spinner fa-spin"></i>
                    <h3>جاري تحميل المنتج...</h3>
                </div>
            </div>
        </div>
    </main>

    <script>
        let products = [];
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        let selectedQuantity = 1;

        function loadProducts() {
            const saved = localStorage.getItem('products');
            if (saved) {
                products = JSON.parse(saved);
            } else {
                products = [
                    { id: 1, name: "MacBook Pro M2", price: 45000, category: "laptops", description: "شريحة M2، 16GB رام، 512GB SSD", stock: 15, icon: "laptop", image: null },
                    { id: 2, name: "ASUS ROG Strix", price: 38000, category: "laptops", description: "RTX 4060، 16GB رام", stock: 8, icon: "laptop", image: null },
                    { id: 3, name: "Samsung 27'' 4K", price: 8500, category: "screens", description: "شاشة 4K UHD، 60Hz", stock: 12, icon: "tv", image: null },
                    { id: 4, name: "LG UltraGear 24''", price: 4500, category: "screens", description: "144Hz، 1ms", stock: 20, icon: "tv", image: null },
                    { id: 5, name: "Cooler Master Case", price: 2800, category: "cases", description: "كيسة Mid Tower", stock: 10, icon: "server", image: null },
                    { id: 6, name: "Logitech MX Master 3S", price: 1800, category: "accessories", description: "ماوس لاسلكي", stock: 25, icon: "mouse", image: null }
                ];
                localStorage.setItem('products', JSON.stringify(products));
            }
        }

        function getProductFromUrl() {
            const params = new URLSearchParams(window.location.search);
            const id = parseInt(params.get('id'));
            if (isNaN(id)) return null;
            return products.find(p => p.id === id);
        }

        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const total = cart.reduce((s, i) => s + i.quantity, 0);
            const cartCountSpan = document.getElementById('cartCount');
            if (cartCountSpan) cartCountSpan.innerText = total;
        }

        function showToast(msg) {
            const t = document.createElement('div');
            t.className = 'toast';
            t.innerHTML = `✅ ${msg}`;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        function addToCart(product, qty) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            const existing = cart.find(i => i.id === product.id);
            if (existing) {
                existing.quantity += qty;
            } else {
                cart.push({ ...product, quantity: qty });
            }
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
            showToast(`تم إضافة ${qty} × ${product.name} إلى السلة`);
        }

        function getCategoryName(cat) { const n = { laptops: 'لابتوب', screens: 'شاشة', cases: 'كيسة', accessories: 'اكسسوار' }; return n[cat] || cat; }
        function getIconClass(cat) { const i = { laptops: 'laptop', screens: 'tv', cases: 'server', accessories: 'headphones' }; return i[cat] || 'box'; }

        function renderProductDetails(p) {
            const container = document.getElementById('productDetailContainer');
            document.getElementById('productNameSpan').innerText = p.name;
            const stockStatus = p.stock > 0 ? `<div class="stock-status">✅ متوفر (${p.stock} قطعة)</div>` : `<div class="stock-status out-of-stock">❌ غير متوفر</div>`;
            container.innerHTML = `<div class="product-detail"><div class="product-detail-grid"><div class="product-gallery"><div class="main-image">${p.image && p.image !== 'null' && p.image !== '' ? `<img src="${p.image}" alt="${p.name}">` : `<i class="fas fa-${getIconClass(p.category)}" style="font-size:120px;"></i>`}</div><div class="thumbnail-list"><div class="thumbnail active">${p.image && p.image !== 'null' && p.image !== '' ? `<img src="${p.image}">` : `<i class="fas fa-${getIconClass(p.category)}"></i>`}</div></div></div><div class="product-info-detail">${p.badge ? `<div class="product-badge">${p.badge}</div>` : ''}<h1 class="product-title-detail">${p.name}</h1><div class="product-category-detail"><i class="fas ${p.category === 'laptops' ? 'fa-laptop' : p.category === 'screens' ? 'fa-tv' : p.category === 'cases' ? 'fa-server' : 'fa-headphones'}"></i> ${getCategoryName(p.category)}</div><div class="product-price-detail">${p.price.toLocaleString()} ج.م</div><div class="product-description">${p.description || 'لا يوجد وصف للمنتج'}</div><div class="quantity-section"><span class="quantity-label">الكمية:</span><div class="quantity-selector"><button class="quantity-btn" onclick="decrementQuantity()">-</button><input type="text" class="quantity-input" id="quantityInput" value="1" readonly><button class="quantity-btn" onclick="incrementQuantity(${p.stock})">+</button></div></div><button class="btn-add-cart" onclick="handleAddToCart(${JSON.stringify(p).replace(/"/g, '&quot;')})"><i class="fas fa-cart-plus"></i> أضف إلى السلة</button>${stockStatus}</div></div></div>`;
        }

        function incrementQuantity(max) { if (selectedQuantity < max) { selectedQuantity++; document.getElementById('quantityInput').value = selectedQuantity; } else showToast(`لا يوجد كمية أكبر من ${max}`); }
        function decrementQuantity() { if (selectedQuantity > 1) { selectedQuantity--; document.getElementById('quantityInput').value = selectedQuantity; } }
        function handleAddToCart(p) { if (p.stock === 0) { showToast('المنتج غير متوفر'); return; } addToCart(p, selectedQuantity); selectedQuantity = 1; document.getElementById('quantityInput').value = 1; }
        function showError() { const container = document.getElementById('productDetailContainer'); container.innerHTML = `<div class="error-container"><i class="fas fa-exclamation-triangle"></i><h3>⚠️ المنتج غير موجود</h3><a href="products.html" class="btn-back">العودة للمنتجات</a></div>`; document.getElementById('productNameSpan').innerText = 'منتج غير موجود'; }

        document.addEventListener('DOMContentLoaded', () => {
            loadProducts(); updateCartCount();
            const p = getProductFromUrl();
            if (p) renderProductDetails(p);
            else showError();
            document.getElementById('cartIcon').addEventListener('click', () => { window.location.href = 'cart.html'; });
        });
        window.incrementQuantity = incrementQuantity; window.decrementQuantity = decrementQuantity; window.handleAddToCart = handleAddToCart;
    </script>
</body>

</html>
